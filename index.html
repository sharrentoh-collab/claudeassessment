<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFD700">
    <title>Preschool Fun Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Menu Section -->
        <div id="menu" class="screen">
            <h1>Welcome to Preschool Fun!</h1>
            <div class="menu-buttons">
                <button class="menu-btn" data-game="count">🍎 Count the Apples</button>
                <button class="menu-btn" data-game="color">🎨 Color Match</button>
                <button class="menu-btn" data-game="letter">📝 Find the Letter</button>
                <button class="menu-btn" data-game="shape">🔷 Shape Match</button>
                <button class="menu-btn" data-game="math">➕ Simple Math</button>
                <button class="menu-btn" data-game="animal">🐾 Animal Match</button>
            </div>
        </div>

        <!-- Game Section -->
        <div id="game" class="screen hidden">
            <button id="back-btn" aria-label="Back to Menu">⬅ Back to Menu</button>
            <div id="feedback-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

            <!-- Count the Apples Game -->
            <div id="count-game" class="game-container hidden">
                <h2>Count the Apples!</h2>
                <div id="tree">
                    <div class="tree-emoji">🌳</div>
                    <div id="apples"></div>
                </div>
                <div class="options">
                    <button class="option-btn" data-value="1">1</button>
                    <button class="option-btn" data-value="2">2</button>
                    <button class="option-btn" data-value="3">3</button>
                </div>
            </div>

            <!-- Color Match Game -->
            <div id="color-game" class="game-container hidden">
                <h2>Color Match!</h2>
                <div id="target-color">
                    <div class="bucket">🪣</div>
                </div>
                <div class="options">
                    <button class="option-btn color-obj" data-color="red">🎈</button>
                    <button class="option-btn color-obj" data-color="blue">🚗</button>
                    <button class="option-btn color-obj" data-color="green">🍃</button>
                </div>
            </div>

            <!-- Find the Letter Game -->
            <div id="letter-game" class="game-container hidden">
                <h2>Find the Letter!</h2>
                <div id="uppercase-letter"></div>
                <div class="options">
                    <button class="option-btn letter-opt"></button>
                    <button class="option-btn letter-opt"></button>
                    <button class="option-btn letter-opt"></button>
                </div>
            </div>
            <!-- Shape Match Game -->
            <div id="shape-game" class="game-container hidden">
                <h2>Shape Match!</h2>
                <div id="shape-display"></div>
                <p class="game-prompt">What shape is this?</p>
                <div class="options" id="shape-options"></div>
            </div>

            <!-- Simple Math Game -->
            <div id="math-game" class="game-container hidden">
                <h2>Simple Math!</h2>
                <div id="math-question"></div>
                <div class="options" id="math-options"></div>
            </div>

            <!-- Animal Match Game -->
            <div id="animal-game" class="game-container hidden">
                <h2>Animal Match!</h2>
                <div id="animal-display"></div>
                <p class="game-prompt">What animal is this?</p>
                <div class="options" id="animal-options"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
